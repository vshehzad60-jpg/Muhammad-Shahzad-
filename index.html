<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Muhammad Shahzad Virk | Official Profile</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* Welcome Screen (Pre-loader) Styling */
        #welcome-screen {
            position: fixed;
            width: 100%;
            height: 100vh;
            background: #0f172a; /* Dark background */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease-out;
        }

        .welcome-text {
            color: #38bdf8;
            font-size: 3rem;
            font-weight: bold;
            font-family: 'Segoe UI', sans-serif;
            animation: fadeInOut 3s forwards;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.1); }
        }

        /* Normal Website content (Shuru mein chupa hoga) */
        #main-content {
            display: none;
        }

        /* Baqi purani styling */
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; margin: 0; padding: 0; text-align: center; }
        .full-container { width: 100%; max-width: 600px; margin: 0 auto; padding-bottom: 50px; }
        .full-img { width: 90%; height: auto; display: block; margin: 20px auto; border-radius: 15px; border: 2px solid #38bdf8; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .intro-section { padding: 30px 20px; background: #1e293b; margin: 15px 10px; border-radius: 15px; }
        h1 { color: #38bdf8; }
        
        /* WhatsApp Floating Button */
        .whatsapp-float {
            position: fixed; width: 60px; height: 60px; bottom: 20px; right: 20px;
            background-color: #25d366; color: #FFF; border-radius: 50px;
            text-align: center; font-size: 35px; box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            z-index: 100; display: flex; align-items: center; justify-content: center;
            text-decoration: none; animation: shake 3s infinite;
        }
        @keyframes shake {
            0% { transform: scale(1); }
            10% { transform: scale(1.1) rotate(5deg); }
            20% { transform: scale(1.1) rotate(-5deg); }
            40% { transform: scale(1); }
        }
        iframe { border: 3px solid #38bdf8; border-radius: 15px; width: 315px; height: 560px; max-width: 90%; }
        .footer { padding: 30px; font-size: 0.8rem; color: #64748b; background: #0a111f; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="welcome-text">Welcome</div>
        <p style="color: #64748b;">Muhammad Shahzad Virk</p>
    </div>

    <div id="main-content">
        
        <a href="https://wa.me/923070640582" class="whatsapp-float" target="_blank">
            <i class="fab fa-whatsapp"></i>
        </a>

        <div class="full-container">
            <div class="intro-section">
                <h1>Muhammad Shahzad Virk</h1>
                <p>Khushamdeed meri digital duniya mein!</p>
            </div>

            <a href="retouch_2026041106252019.jpg" target="_blank"><img src="retouch_2026041106252019.jpg" class="full-img"></a>
            <a href="retouch_2026041806132243.jpg" target="_blank"><img src="retouch_2026041806132243.jpg" class="full-img"></a>
            <a href="1775474773718.jpg" target="_blank"><img src="1775474773718.jpg" class="full-img"></a>
            <a href="1758513268184.jpg" target="_blank"><img src="1758513268184.jpg" class="full-img"></a>

            <div class="intro-section">
                <p style="color: #38bdf8; font-weight: bold;">Step by Step towards Success</p>
                <p>"I am constantly learning and growing."</p>
            </div>

            <div class="video-box">
                <iframe src="https://www.youtube.com/embed/UW05xZdKrZs" allowfullscreen></iframe>
            </div>

            <div class="footer">© 2026 Muhammad Shahzad Virk</div>
        </div>
    </div>

    <script>
        setTimeout(function() {
            document.getElementById('welcome-screen').style.opacity = '0';
            setTimeout(function() {
                document.getElementById('welcome-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            }, 1000); // Animation ke baad hatane ke liye
        }, 3000); // 3 second ka intezar
    </script>

</body>
</html>
